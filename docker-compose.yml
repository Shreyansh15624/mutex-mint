version: '3.8'

services:
  # The Primary Database!
  db:
    image: postgres:15-alpine
    container_name: ledger_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
  
  # Dedicated Testing Database
  test_db:
    image: postgres:15-alpine
    container_name: ledger_postgres_test
    # Not using a Volume in here to maintain Blazing Fast Speeds
    environment:
      POSTGRES_USER: ledger_admin
      POSTGRES_PASSWORD: abc123
      POSTGRES_DB: fintech_ledger_test
    ports:
    - "5433:5432"
  
  ledger_redis:
    image: redis:7-alpine
    container_name: ledger_redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    networks:
      - default
  
networks:
  default:
    driver: bridge